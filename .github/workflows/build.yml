name: Build Telegram-XRay APK

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;21.4.7075529" "build-tools;35.0.0" "platforms;android-35"

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build APK (Standalone Afat)
        run: ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-XRay-APK
          path: TMessagesProj_AppStandalone/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TMessagesProj_AppStandalone/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
