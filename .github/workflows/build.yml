name: Build Telegram-XRay APK

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 2G
  CCACHE_COMPILERCHECK: content
  NDK_VERSION: 21.4.7075529

# A newer commit makes an older queued build unnecessary.
concurrency:
  group: apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ccache
        run: |
          sudo apt-get update && sudo apt-get install -y ccache
          ccache --set-config=max_size=${CCACHE_MAXSIZE}
          ccache --set-config=compiler_check=${CCACHE_COMPILERCHECK}
          ccache -z
          echo "NDK_CCACHE=$(which ccache)" >> $GITHUB_ENV

      # ccache uses source-content hashes, so this stable cache can safely be
      # shared by all commits built with the same native toolchain.
      - name: Restore native build cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ccache-${{ runner.os }}-ndk-${{ env.NDK_VERSION }}-${{ hashFiles('TMessagesProj/jni/CMakeLists.txt', 'TMessagesProj/jni/**/*.mk') }}
          restore-keys: |
            ccache-${{ runner.os }}-ndk-${{ env.NDK_VERSION }}-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;${NDK_VERSION}" "build-tools;35.0.0" "platforms;android-35"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Show ccache stats (before build)
        run: ccache -s

      - name: Build APK (Standalone Afat)
        run: |
          ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone \
            --build-cache \
            --parallel \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC" \
            --stacktrace

      - name: Show ccache stats (after build)
        run: ccache -s

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-XRay-${{ github.sha }}
          path: TMessagesProj_AppStandalone/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: error

      # Every push updates one rolling pre-release. The APK asset is therefore
      # always available at Releases without creating a release per commit.
      - name: Publish rolling APK release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest Telegram-XRay APK
          prerelease: true
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: TMessagesProj_AppStandalone/build/outputs/apk/**/*.apk
          body: |
            ## Latest Telegram-XRay APK

            Commit: ${{ github.sha }}
            Branch or tag: ${{ github.ref_name }}

            Download the APK asset below and install it on your Android device.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
