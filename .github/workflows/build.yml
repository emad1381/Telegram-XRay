name: Build Telegram-XRay APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 2G
  CCACHE_COMPILERCHECK: content

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ccache
        run: |
          sudo apt-get update && sudo apt-get install -y ccache
          ccache --set-config=max_size=2G
          ccache --set-config=compiler_check=content
          ccache -z
          echo "NDK_CCACHE=$(which ccache)" >> $GITHUB_ENV

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ccache-arm64-${{ github.sha }}
          restore-keys: |
            ccache-arm64-

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;21.4.7075529" "build-tools;35.0.0" "platforms;android-35"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Show ccache stats (before build)
        run: ccache -s

      - name: Build APK (Standalone Afat)
        run: |
          ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone \
            --build-cache \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC" \
            --stacktrace

      - name: Show ccache stats (after build)
        run: ccache -s

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-XRay-APK
          path: TMessagesProj_AppStandalone/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TMessagesProj_AppStandalone/build/outputs/apk/**/*.apk
          name: "Telegram-XRay ${{ github.ref_name }}"
          body: |
            ## 🚀 Telegram-XRay ${{ github.ref_name }}

            **Based on:** Telegram 12.9.0 (build 6966)
            **Architecture:** ARM64 (arm64-v8a)

            ### ✨ Features
            - VLESS proxy with REALITY, TLS, WebSocket, gRPC, KCP, QUIC support
            - Subscription URL support with auto-update
            - Xray core integration with automatic download

            ### 📥 Installation
            Download the APK file below and install it on your Android device.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
