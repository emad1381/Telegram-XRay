name: Build Telegram-XRay APK

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      fast_build:
        description: 'Fast Build (ARM64 only - 3x faster)'
        type: boolean
        default: false

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle & C++ Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.ccache
          key: ${{ runner.os }}-telegram-xray-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-telegram-xray-

      - name: Install ccache
        run: |
          sudo apt-get update && sudo apt-get install -y ccache
          echo "NDK_CCACHE=ccache" >> $GITHUB_ENV

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;21.4.7075529" "build-tools;35.0.0" "platforms;android-35"

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build APK (Standalone Afat)
        run: |
          ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone \
            --build-cache \
            --parallel \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:+UseG1GC" \
            --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-XRay-APK
          path: TMessagesProj_AppStandalone/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TMessagesProj_AppStandalone/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
